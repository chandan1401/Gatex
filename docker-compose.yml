version: '3.8'

services:
  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gatex-api-gateway
    ports:
      - "3000:3000"
      - "9090:9090"
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - LOG_LEVEL=info
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGODB_URI=mongodb://mongo:27017/gatex
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3004
    depends_on:
      - redis
      - mongo
    volumes:
      - ./src:/app/src
      - ./src/logs:/app/src/logs
    networks:
      - gatex-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gatex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gatex-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongo:
    image: mongo:6
    container_name: gatex-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: gatex
    volumes:
      - mongo-data:/data/db
    networks:
      - gatex-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: gatex-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - gatex-network
    depends_on:
      - api-gateway

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: gatex-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - gatex-network
    depends_on:
      - prometheus

  # Auth Service
  auth-service:
    build:
      context: ./microservices/auth-service
      dockerfile: Dockerfile
    container_name: gatex-auth-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/auth-service
      - JWT_SECRET=your-secret-key-here
    depends_on:
      - mongo
    networks:
      - gatex-network
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./microservices/user-service
      dockerfile: Dockerfile
    container_name: gatex-user-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGODB_URI=mongodb://mongo:27017/user-service
    depends_on:
      - mongo
    networks:
      - gatex-network
    restart: unless-stopped

  # Order Service
  order-service:
    build:
      context: ./microservices/order-service
      dockerfile: Dockerfile
    container_name: gatex-order-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - MONGODB_URI=mongodb://mongo:27017/order-service
    depends_on:
      - mongo
    networks:
      - gatex-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    build:
      context: ./microservices/payment-service
      dockerfile: Dockerfile
    container_name: gatex-payment-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - MONGODB_URI=mongodb://mongo:27017/payment-service
    depends_on:
      - mongo
    networks:
      - gatex-network
    restart: unless-stopped

  # NGINX Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: gatex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - gatex-network
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  redis-data:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  gatex-network:
    driver: bridge
